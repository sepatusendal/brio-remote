name: Build agent binaries

# Builds a standalone Brio agent binary for macOS, Windows, and Linux using
# each platform's own native runner. This is deliberately NOT a cross-compile
# from a single OS — the agent depends on cgo (robotgo, for mouse/keyboard
# control), and cgo cross-compilation is fragile/unreliable. Building on
# real OS-native runners is the correct fix.
#
# Trigger manually from the Actions tab, or on a version tag push (v*).

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Server URL to bake into the binary (e.g. wss://100.x.y.z:3000). Leave empty to require BRIO_SERVER_URL at runtime."
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            output: brio-agent-darwin-arm64
          - os: windows-latest
            output: brio-agent-windows-amd64.exe
          - os: ubuntu-latest
            output: brio-agent-linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Linux needs X11/xkb dev headers for robotgo + kbinani/screenshot.
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev xorg-dev libxtst-dev libpng-dev \
            libxkbcommon-dev

      - name: Build
        working-directory: apps/agent
        shell: bash
        run: |
          go mod tidy
          LDFLAGS=""
          if [ -n "${{ github.event.inputs.server_url }}" ]; then
            LDFLAGS="-X main.defaultServerURL=${{ github.event.inputs.server_url }}"
          fi
          CGO_ENABLED=1 go build -ldflags "$LDFLAGS" -o "../../${{ matrix.output }}" .

      # Windows gets a proper GUI installer on top of the raw .exe — a
      # real Next/Next/Install/Finish wizard the client double-clicks,
      # instead of needing to open PowerShell. GitHub's windows-latest
      # runners ship with Inno Setup preinstalled.
      - name: Build Windows installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.output }}" "apps\agent\deploy\windows\brio-agent.exe"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "apps\agent\deploy\windows\brio-agent.iss"
          Copy-Item "apps\agent\deploy\windows\output\BrioAgentSetup.exe" "BrioAgentSetup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: BrioAgentSetup.exe
          path: BrioAgentSetup.exe
